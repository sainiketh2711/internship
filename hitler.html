<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <label for="fullname">NAME:</label>
        <input type="text" placeholder="ENTER YOUR NAME" name="fullname" id="fullname" required><br><br>

        <label for="email">EMAIL:</label>
        <input type="email" placeholder="ENTER YOUR EMAIL" name="email" id="email"><br><br>

        <label for="ph number">Contact:</label>
        <input type="number" placeholder="ENTER YOUR NUMBER" maxlength="10" name="ph number" id=""><br><br>

        <!-- password-->
        <label for="psw">PASSWORD:</label>
        <input type="password" placeholder="ENTER YOUR PASSWORD" minlength="8" name="psw" id="psw"><br><br>
        
        <!-- number input-->
        <label for="age">AGE:</label>
        <input type="number" placeholder="ENTER YOUR AGE" min="18" max="120" name="age" id="age"><br><br>  

        <!-- radio buttons-->
        <label for="gender">GENDER:</label>
        <input type="radio" name="gender" value="male" id="male">MALE   
        <input type="radio" name="gender" value="female" id="female">FEMALE <br><br>

        <!-- checkbox-->
        <label for="languages">LANGUAGES:</label>
        <input type="checkbox" name="languages" value="HTML" id="HTML">HTML<br>
        <input type="checkbox" name="languages" value="C++" id="C++">C++<br>
        <input type="checkbox" name="languages" value="PYTHON" id="PYTHON">PYTHON<br>
        <input type="checkbox" name="languages" value="JAVA" id="JAVA">JAVA <br><br>

        <!-- dropdown -->
        <label for="country">COUNTRY:</label>
        <select name="country" id="country">
            <option value="india">India</option>
            <option value="usa">USA</option>
            <option value="uk">UK</option>
        </select><br><br>

        <!-- text area -->
        <label for="message">MESSAGE:</label><br>
        <textarea name="message" id="message" rows="4" cols="50"></textarea><br><br>

        <!-- file upload -->
        <label for="resume">UPLOAD RESUME:</label>
        <input type="file" name="resume" id="resume"><br><br>

        <!-- date picker -->
        <label for="dob">DATE OF BIRTH:</label>
        <input type="date" name="dob" id="dob"><br><br>

        <!-- button-->
        <button type="submit" value="SUBMIT">SUBMIT</button>
        <button type="reset" value="RESET">RESET</button>
    </form>
</body>
</html>
